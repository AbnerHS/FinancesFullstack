name: Deploy Backend

on:
  push:
    branches:
      - main
      - master
    paths:
      - "rest-api-finances/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag existente para reimplantar. Deixe vazio para publicar a ref atual."
        required: false
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.image.outputs.image_name }}
      image_tag: ${{ steps.tag.outputs.image_tag }}

    steps:
      - name: Resolve image name
        id: image
        run: echo "image_name=${{ env.REGISTRY }}/${GITHUB_REPOSITORY_OWNER,,}/finances-backend" >> "$GITHUB_OUTPUT"

      - name: Resolve image tag
        id: tag
        env:
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          if [ -n "$INPUT_IMAGE_TAG" ]; then
            echo "image_tag=$INPUT_IMAGE_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

  publish:
    runs-on: ubuntu-latest
    needs: prepare
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.image_tag == ''
    permissions:
      contents: read
      packages: write

    defaults:
      run:
        working-directory: rest-api-finances

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run Maven tests
        run: ./mvnw -B test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./rest-api-finances
          file: ./rest-api-finances/Dockerfile
          push: true
          tags: |
            ${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.image_tag }}
            ${{ needs.prepare.outputs.image_name }}:prod-latest

  deploy-production:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - publish
    if: always() && needs.prepare.result == 'success' && (needs.publish.result == 'success' || needs.publish.result == 'skipped')
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy production compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          source: rest-api-finances/deploy/vps/docker-compose.prod.yml
          target: ${{ secrets.VPS_DEPLOY_PATH }}
          strip_components: 3

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_IMAGE: ${{ needs.prepare.outputs.image_name }}
          IMAGE_TAG: ${{ needs.prepare.outputs.image_tag }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          port: ${{ secrets.VPS_PORT }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          envs: BACKEND_IMAGE,IMAGE_TAG,GHCR_USERNAME,GHCR_TOKEN,VPS_DEPLOY_PATH
          script: |
            set -euo pipefail
            mkdir -p "$VPS_DEPLOY_PATH"
            cd "$VPS_DEPLOY_PATH"

            if [ ! -f ".env" ]; then
              echo "Arquivo .env nao encontrado em $VPS_DEPLOY_PATH" >&2
              exit 1
            fi

            cp .env .deploy.env
            cat >> .deploy.env <<EOF
            BACKEND_IMAGE=$BACKEND_IMAGE
            IMAGE_TAG=$IMAGE_TAG
            EOF

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker compose --env-file .deploy.env -f docker-compose.prod.yml pull spring-app
            docker compose --env-file .deploy.env -f docker-compose.prod.yml up -d --remove-orphans

            ATTEMPTS=0
            until [ "$ATTEMPTS" -ge 18 ]; do
              STATUS="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' spring-app 2>/dev/null || true)"
              if [ "$STATUS" = "healthy" ] || [ "$STATUS" = "running" ]; then
                break
              fi
              ATTEMPTS=$((ATTEMPTS + 1))
              sleep 10
            done

            STATUS="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' spring-app 2>/dev/null || true)"
            if [ "$STATUS" != "healthy" ] && [ "$STATUS" != "running" ]; then
              docker compose --env-file .deploy.env -f docker-compose.prod.yml logs --tail=100 spring-app
              exit 1
            fi

            docker image prune -af --filter "until=168h"
