name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest

    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          # Releases created with GITHUB_TOKEN do not trigger downstream
          # workflows such as the production deploy on `release.published`.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GH_RELEASE_PAT || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
