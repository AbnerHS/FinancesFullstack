name: CI Backend

on:
  pull_request:
    paths:
      - "rest-api-finances/**"
      - ".github/workflows/ci-backend.yml"
  push:
    branches:
      - dev
      - main
      - master
    paths:
      - "rest-api-finances/**"
      - ".github/workflows/ci-backend.yml"

jobs:
  test:
    if: |
      (github.event_name != 'pull_request' || !startsWith(github.event.pull_request.title, 'chore(main): release')) &&
      (github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(main): release'))
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: rest-api-finances

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run Maven tests
        run: ./mvnw -B test
