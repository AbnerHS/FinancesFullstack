services:
  mysql-db:
    ports:
      - "3306:3306"
    restart: unless-stopped
    command:
      - --innodb-buffer-pool-size=128M
      - --innodb-log-buffer-size=8M
      - --max-connections=20
      - --table-open-cache=64
      - --thread-cache-size=8
      - --performance-schema=OFF
      - --skip-name-resolve
    mem_limit: 384m
    mem_reservation: 256m
    cpus: "0.50"
    pids_limit: 100
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  spring-app:
    ports:
      - "8080:8080"
    environment:
      JAVA_TOOL_OPTIONS: >-
        -XX:+UseContainerSupport
        -XX:InitialRAMPercentage=20
        -XX:MaxRAMPercentage=60
        -XX:MinRAMPercentage=20
        -XX:+UseSerialGC
        -Djava.security.egd=file:/dev/./urandom
    mem_limit: 320m
    mem_reservation: 192m
    cpus: "0.50"
    pids_limit: 120
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
