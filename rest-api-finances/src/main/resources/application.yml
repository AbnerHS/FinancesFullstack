spring:
  application:
    name: rest-api-finances

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver

  hikari:
    maximum-pool-size: 10
    minimum-idle: 5
    idle-timeout: 30000
    pool-name: MyOraclePool

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: ${DB_USERNAME}
        format_sql: true
  #        show_sql: true
  #      javax:
  #        persistence:
  #          schema-generation:
  #            scripts:
  #              action: create
  #              create-target: target/schema_inicial.sql

  flyway:
    enabled: true
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: ${SPRING_DATASOURCE_URL}
#    schemas: ${FLYWAY_SCHEMAS}
#    baseline-on-migrate: true
#    repair-on-migrate: true


logging:
  level:
    com.abner: DEBUG

server:
  port: ${SERVER_PORT}

jwt:
  access:
    secret: ${JWT_ACCESS_TOKEN_SECRET}
    expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
  refresh:
    secret: ${JWT_REFRESH_TOKEN_SECRET}
    expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
    cookie:
      secure: ${JWT_REFRESH_COOKIE_SECURE:false}
      same-site: ${JWT_REFRESH_COOKIE_SAME_SITE:Lax}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://192.168.0.115:5173}
