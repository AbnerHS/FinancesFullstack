spring:
  application:
    name: rest-api-finances

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 30000
      max-lifetime: 600000
      connection-timeout: 20000
      pool-name: MySqlPool

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        type:
          preferred_uuid_jdbc_type: BINARY

  flyway:
    enabled: true
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: ${SPRING_DATASOURCE_URL}

logging:
  level:
    com.abner: INFO

server:
  port: ${SERVER_PORT}

jwt:
  access:
    secret: ${JWT_ACCESS_TOKEN_SECRET}
    expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
  refresh:
    secret: ${JWT_REFRESH_TOKEN_SECRET}
    expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
    cookie:
      secure: ${JWT_REFRESH_COOKIE_SECURE:false}
      same-site: ${JWT_REFRESH_COOKIE_SAME_SITE:Lax}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://192.168.0.115:5173}
    allowed-origin-patterns: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
