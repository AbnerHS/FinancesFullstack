spring:
  datasource:
    url: jdbc:h2:mem:finances-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        type:
          preferred_uuid_jdbc_type: BINARY
  flyway:
    enabled: false

server:
  port: 0

jwt:
  access:
    secret: c3VwZXItc2VjcmV0LWFjY2Vzcy10b2tlbi1rZXktMzItYnl0ZXM=
    expiration-ms: 900000
  refresh:
    secret: c3VwZXItc2VjcmV0LXJlZnJlc2gtdG9rZW4ta2V5LTMyLWJ5dGVz
    expiration-ms: 604800000
    cookie:
      secure: false
      same-site: Lax

app:
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
    allowed-origin-patterns:
