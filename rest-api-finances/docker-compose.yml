services:
  mysql-db:
    image: mysql:8.4
    env_file: .env
    volumes:
      - mysql_data:/var/lib/mysql
    container_name: mysql-db
    ports:
      - "3306:3306"
    restart: unless-stopped
    command:
      - --innodb-buffer-pool-size=128M
      - --innodb-log-buffer-size=8M
      - --max-connections=20
      - --table-open-cache=64
      - --thread-cache-size=8
      - --performance-schema=OFF
      - --skip-host-cache
      - --skip-name-resolve
    mem_limit: 384m
    mem_reservation: 256m
    cpus: "0.50"
    pids_limit: 100
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  spring-app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    container_name: spring-app
    ports:
      - "8080:8080"
    environment:
      JAVA_TOOL_OPTIONS: >-
        -XX:+UseContainerSupport
        -XX:InitialRAMPercentage=20
        -XX:MaxRAMPercentage=60
        -XX:MinRAMPercentage=20
        -XX:+UseSerialGC
        -Djava.security.egd=file:/dev/./urandom
      mem_limit: 320m
    mem_reservation: 192m
    cpus: "0.50"
    pids_limit: 120
    depends_on:
      mysql-db:
        condition: service_healthy # Espera o banco estar pronto para subir o Spring
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:
