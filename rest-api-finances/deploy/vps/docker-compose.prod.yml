services:
  mysql-db:
    image: mysql:8.4
    container_name: mysql-db
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    command:
      - --innodb-buffer-pool-size=128M
      - --innodb-log-buffer-size=8M
      - --max-connections=20
      - --table-open-cache=64
      - --thread-cache-size=8
      - --performance-schema=OFF
      - --skip-name-resolve
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s
    restart: unless-stopped
    mem_limit: 384m
    mem_reservation: 256m
    cpus: "0.50"
    pids_limit: 100
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  spring-app:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE not set}:${IMAGE_TAG:?IMAGE_TAG not set}
    container_name: spring-app
    env_file:
      - .env
    depends_on:
      mysql-db:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8080/actuator/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 45s
    environment:
      JAVA_TOOL_OPTIONS: >-
        -XX:+UseContainerSupport
        -XX:InitialRAMPercentage=20
        -XX:MaxRAMPercentage=60
        -XX:MinRAMPercentage=20
        -XX:+UseSerialGC
        -Djava.security.egd=file:/dev/./urandom
    volumes:
      - ./payment-documents:/app/data/payment-documents
    restart: unless-stopped
    mem_limit: 320m
    mem_reservation: 192m
    cpus: "0.50"
    pids_limit: 120
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:
